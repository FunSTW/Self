<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>怪物蒐集</title>
    <style>
        :root { 
            --bg: #0f0f0f; 
            --card-bg: #1a1a1a; 
            --gold: #BF953F; 
            --light-gold: #FCF6BA; 
            --text: #eee; 
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            margin: 0; padding: 20px; text-align: center; user-select: none;
            padding-bottom: 80px; /* 為右下角提示留空間 */
        }

        h1 {
            font-size: 2.5rem; font-weight: 900;
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent; animation: shine 3s linear infinite;
            text-shadow: 0 0 30px rgba(251, 245, 183, 0.3); margin: 0 0 10px 0;
            display: inline-block;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* Mask 管理區 */
        .mask-manager {
            background: #222; border: 1px solid #444; padding: 15px;
            margin-bottom: 20px; border-radius: 8px; display: flex;
            flex-direction: column; gap: 10px; align-items: center;
        }
        .mask-input-group { display: flex; gap: 5px; width: 100%; max-width: 80vw; min-width: 500px; }
        .mask-input {
            flex: 1; background: #000; border: 1px solid var(--gold);
            color: var(--light-gold); padding: 8px 10px; font-family: monospace;
            border-radius: 4px; font-size: 14px;
        }

        /* 右下角浮動提示視窗 */
        #toast {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(34, 34, 34, 0.95);
            border: 1px solid var(--gold);
            padding: 10px 15px; border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000; text-align: left;
            transition: transform 0.3s, opacity 0.3s;
            transform: translateY(150%); opacity: 0;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
        .toast-title { font-size: 13px; color: #55ff55; font-weight: bold; margin-bottom: 4px; }
        .toast-hint { font-size: 11px; color: #888; white-space: nowrap; }

        .controls { margin-bottom: 25px; display: flex; justify-content: center; gap: 10px; }
        .btn {
            background: #222; border: 1px solid var(--gold); color: var(--light-gold);
            padding: 8px 16px; cursor: pointer; font-size: 13px; border-radius: 4px; transition: 0.2s;
        }
        .btn:hover { background: var(--gold); color: #000; font-weight: bold; }

        .container { max-width: 1200px; margin: auto; }
        .region-header { 
            grid-column: 1 / -1; display: flex; justify-content: space-between;
            align-items: center; font-size: 16px; color: var(--gold); 
            margin: 25px 0 10px 0; border-left: 3px solid var(--gold); 
            padding: 0 12px; text-align: left;
        }
        
        .region-controls { display: flex; gap: 8px; }
        .btn-sm {
            background: transparent; border: 1px solid #333; color: #666;
            font-size: 10px; padding: 2px 6px; cursor: pointer; border-radius: 3px;
        }
        .btn-sm:hover { border-color: var(--gold); color: var(--light-gold); }

        .monster-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); 
            gap: 6px; 
        }
        
        .monster-node { 
            background: rgba(191, 149, 63, 0.05); aspect-ratio: 1/1; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; border: 1px solid var(--gold); transition: 0.2s; border-radius: 4px;
        }
        .monster-img { width: 60%; height: 60%; object-fit: contain; transition: 0.3s; }
        .monster-name { font-size: 10px; margin-top: 6px; color: var(--light-gold); }

        .monster-node.excluded { background: var(--card-bg); border-color: #252525; }
        .monster-node.excluded .monster-img { filter: grayscale(100%) brightness(0.25); opacity: 0.25; }
        .monster-node.excluded .monster-name { color: #444; }

		.grid-break {
			grid-column: auto; /* 預設不橫跨整列 */
			height: 0;
			margin: 0;
			visibility: hidden;
			display: none; /* 預設隱藏，不佔位 */
		}
		
		/* 新增：當 body 有 enable-newline 時，換行才生效 */
		body.enable-newline .grid-break {
			display: block; /* 顯示出來 */
			grid-column: 1 / -1; /* 橫跨整列達成換行 */
		}
    </style>
</head>
<body>

    <h1>技術谷 怪物蒐集</h1>

    <div class="mask-manager">
        <div style="font-size: 16px; color: var(--gold);">目前存檔代碼 ( 可以複製分享給別人 )</div>
        <div class="mask-input-group">
            <input type="text" id="maskInput" class="mask-input" placeholder="代碼自動更新中...">
            <button class="btn" onclick="copyMask()" style="padding: 5px 12px;">複製</button>
			<button class="btn" onclick="loadManualMask()" style="padding: 5px 12px;">載入</button>
        </div>
    </div>
    
	<div class="controls">
		<button class="btn" onclick="setAll(false)">全部已蒐集</button>
		<button class="btn" onclick="setAll(true)">全部未蒐集</button>
		<button class="btn" id="newlineBtn" onclick="toggleNewline()">自動換行：關</button>
	</div>
	
	<div class="hint">
        <b>Ctrl+Z</b> 復原 | <b>Ctrl+Y</b> 重做 | <b>Ctrl+S</b> 儲存
    </div>

    <div class="container">
        <div id="main-grid" class="monster-grid"></div>
    </div>

    <div id="toast">
        <div class="toast-title">✓ 狀態已同步</div>
    </div>
    
<script type="text/javascript" src="database.js"></script>

<script>
    let flatRegistry = [];
    let historyStack = [];
    let redoStack = [];
    let toastTimer;

    const gridEl = document.getElementById('main-grid');
    const maskInput = document.getElementById('maskInput');
    const toast = document.getElementById('toast');

    // --- Cookie 與 UI 提示 ---
    function setCookie(name, value, days) {
        const d = new Date();
        d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
        document.cookie = `${name}=${value};expires=${d.toUTCString()};path=/;SameSite=Lax`;
        
        // 顯示右下角 Toast
        clearTimeout(toastTimer);
        toast.classList.add('show');
        toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 2000);
    }

    function getCookie(name) {
        const nameEQ = name + "=";
        const ca = document.cookie.split(';');
        for(let i=0; i < ca.length; i++) {
            let c = ca[i].trim();
            if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
        }
        return null;
    }

    // --- 壓縮處理 ---
    const pack = b => {
        const u8 = new Uint8Array(Math.ceil(b.length / 8));
        b.forEach((v, i) => { if(v === "1") u8[i >> 3] |= (1 << (i % 8)); });
        return btoa(String.fromCharCode.apply(null, u8)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    };
    const unpack = (s, len) => {
        if(!s) return "0".repeat(len);
        try {
            const b = atob(s.replace(/-/g, '+').replace(/_/g, '/'));
            const u8 = new Uint8Array(b.length);
            for(let i=0; i<b.length; i++) u8[i] = b.charCodeAt(i);
            let res = "";
            for(let i=0; i<len; i++) res += (u8[i >> 3] & (1 << (i % 8))) ? "1" : "0";
            return res.slice(0, len);
        } catch(e) { return "0".repeat(len); }
    };

    // --- 核心邏輯 ---
    function getCurrentExcludedState() {
        return flatRegistry.map((_, i) => {
            const el = document.getElementById(`n-${i}`);
            return (el && el.classList.contains('excluded')) ? "1" : "0";
        }).join("");
    }

    function applyState(bits, isSync = true) {
        bits.split("").forEach((v, i) => {
            const el = document.getElementById(`n-${i}`);
            if(el) v === "1" ? el.classList.add('excluded') : el.classList.remove('excluded');
        });
        if(isSync) syncStorage(bits);
    }

    function syncStorage(bits) {
        const compressed = pack(bits.split(""));
        setCookie('monster_mask', compressed, 365);
        maskInput.value = compressed;
    }

    function recordHistory() {
        const state = getCurrentExcludedState();
        if (historyStack.length === 0 || historyStack[historyStack.length - 1] !== state) {
            historyStack.push(state);
            redoStack = [];
        }
    }

    function toggleNode(idx) {
        recordHistory();
        document.getElementById(`n-${idx}`).classList.toggle('excluded');
        syncStorage(getCurrentExcludedState());
        recordHistory();
    }

    function setAll(shouldExclude) {
        recordHistory();
        const state = (shouldExclude ? "1" : "0").repeat(flatRegistry.length);
        applyState(state);
        recordHistory();
    }

    function loadManualMask() {
        const code = maskInput.value.trim();
        if(!code) return;
        recordHistory();
        applyState(unpack(code, flatRegistry.length));
        recordHistory();
    }

    function setRegionState(start, count, shouldExclude) {
        recordHistory();
        for (let i = start; i < start + count; i++) {
            const el = document.getElementById(`n-${i}`);
            if (el) shouldExclude ? el.classList.add('excluded') : el.classList.remove('excluded');
        }
        syncStorage(getCurrentExcludedState());
        recordHistory();
    }

    // --- 快捷鍵處理 (攔截 Ctrl+S) ---
    window.addEventListener('keydown', e => {
        if (e.ctrlKey || e.metaKey) {
            const key = e.key.toLowerCase();
            if (key === 'z') {
                e.preventDefault();
                if (historyStack.length > 1) {
                    redoStack.push(historyStack.pop());
                    applyState(historyStack[historyStack.length - 1]);
                }
            } else if (key === 'y') {
                e.preventDefault();
                if (redoStack.length > 0) {
                    const state = redoStack.pop();
                    historyStack.push(state);
                    applyState(state);
                }
            } else if (key === 's') {
                e.preventDefault(); // 阻擋網頁儲存
                syncStorage(getCurrentExcludedState()); // 觸發手動同步
            }
        }
    });

	function copyMask() {
		const input = document.getElementById('maskInput');
		
		// 選取文字
		input.select();
		input.setSelectionRange(0, 99999); // 支援行動裝置
	
		// 執行複製
		if (navigator.clipboard && navigator.clipboard.writeText) {
			navigator.clipboard.writeText(input.value);
		} else {
			// 備用方案
			document.execCommand('copy');
		}
	}

	function toggleNewline() {
		const isEnabled = document.body.classList.toggle('enable-newline');
		updateNewlineUI(isEnabled);
		// 存入 Cookie (存 365 天)
		setCookie('monster_newline', isEnabled ? '1' : '0', 365);
	}
	
	function updateNewlineUI(isEnabled) {
		const btn = document.getElementById('newlineBtn');
		if (btn) {
			btn.innerText = `自動換行：${isEnabled ? '開' : '關'}`;
			// 選項：開啟時可以換顏色區分
			btn.style.borderColor = isEnabled ? '#55ff55' : 'var(--gold)';
		}
	}
	
	// --- 修改原本的 init 函數，加入讀取設定的邏輯 ---
	function init() {
		if (typeof RAW_DATA === 'undefined') return;
		
		// [新增] 讀取換行設定
		const newlineCookie = getCookie('monster_newline');
		const isNewlineEnabled = newlineCookie === '1'; // 預設為關 (0)
		if (isNewlineEnabled) {
			document.body.classList.add('enable-newline');
		}
		updateNewlineUI(isNewlineEnabled);
	
		let itemOffset = 0;
		flatRegistry = [];
		gridEl.innerHTML = ''; 
	
		RAW_DATA.forEach(reg => {
			// ... (這部分維持你原本生成 header 的程式碼)
			const header = document.createElement('div');
			header.className = 'region-header';
			const startIndex = itemOffset;
			const count = reg.items.length;
			header.innerHTML = `
				<span>${reg.region}</span>
				<div class="region-controls">
					<button class="btn-sm" onclick="setRegionState(${startIndex}, ${count}, false)">全開</button>
					<button class="btn-sm" onclick="setRegionState(${startIndex}, ${count}, true)">全關</button>
				</div>
			`;
			gridEl.appendChild(header);
	
			reg.items.forEach(item => {
				const idx = flatRegistry.length;
				flatRegistry.push(item);
				
				const node = document.createElement('div');
				node.className = 'monster-node';
				node.id = `n-${idx}`;
				node.innerHTML = `
					<img src="${item.img}" class="monster-img">
					<div class="monster-name">${item.name}</div>
				`;
				node.onclick = () => toggleNode(idx);
				gridEl.appendChild(node);
				itemOffset++;
			
				if (item.newline === true) {
					const breakEl = document.createElement('div');
					breakEl.className = 'grid-break';
					gridEl.appendChild(breakEl);
				}
			});
		});
	
		// ... (這部分維持原本的 URL/Cookie Mask 載入邏輯)
		const urlParams = new URLSearchParams(window.location.search);
		const urlMask = urlParams.get('m');
		const cookieMask = getCookie('monster_mask');
		const m = urlMask || cookieMask;
		
		const initialState = unpack(m, flatRegistry.length);
		applyState(initialState, true);
		historyStack.push(initialState);
	
		if (urlMask) {
			const cleanUrl = window.location.origin + window.location.pathname;
			window.history.replaceState({}, document.title, cleanUrl);
		}
	}

    window.onload = init;
</script>

</body>
</html>
